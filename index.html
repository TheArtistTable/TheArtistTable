<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Artist Table</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Playfair+Display:wght@400;600&family=Inter:wght@300&display=swap" rel="stylesheet">

<style>

* {margin:0;padding:0;box-sizing:border-box;}

body {
  background:#050505;
  color:#F5F5F0;
  font-family:'Cormorant Garamond', serif;
  overflow:hidden;
}

/* GRAIN */
body::after {
  content:"";
  position:fixed;
  inset:0;
  background:url('https://grainy-gradients.vercel.app/noise.svg');
  opacity:0.05;
  pointer-events:none;
}

/* ENVELOPE */
.stage {
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.envelope {
  width:720px;
  height:440px;
  background:#0a0a0a;
  position:relative;
  box-shadow:0 80px 120px rgba(0,0,0,0.9);
  cursor:pointer;
}

/* FLAP */
.flap {
  position:absolute;
  top:0;
  width:100%;
  height:52%;
  background:#0e0e0e;
  transform-origin:top;
  transition:1.6s cubic-bezier(.23,1,.32,1);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;

  /* 🔥 KEY FIX */
  pointer-events:none;
}

.flap.open {
  transform:rotateX(-170deg);
}

/* TEXT */
.invite {
  font-family:'Inter';
  font-size:10px;
  letter-spacing:6px;
  opacity:0.3;
}

.logo {
  font-family:'Playfair Display';
  letter-spacing:8px;
  font-size:20px;
  margin-top:10px;
}

/* SEAL */
.seal {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90px;
  height:90px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#f5e7c8,#d4c5b0,#a69375);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:3;
}

.seal span {
  color:#000;
  font-weight:bold;
}

.seal.break {
  transform:translate(-50%,-50%) scale(0.6) rotate(8deg);
  opacity:0;
}

/* BOTTOM TEXT */
.bottom-text {
  position:absolute;
  bottom:40px;
  width:100%;
  text-align:center;
  font-size:13px;
  opacity:0.5;
}

/* TOUCH */
.touch {
  margin-top:30px;
  font-size:10px;
  letter-spacing:6px;
  opacity:0.3;
}

/* LETTER */
.letter-stage {
  position:fixed;
  inset:0;
  opacity:0;
  transition:1.2s;
}

.letter-stage.show {
  opacity:1;
}

.letter {
  width:700px;
  margin:auto;
  padding:120px;
  text-align:center;
}

/* POSTED */
.posted {
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:30px;
  opacity:0.2;
}

</style>
</head>

<body>

<audio id="sound" src="https://assets.mixkit.co/sfx/preview/mixkit-paper-rip-998.mp3"></audio>

<div class="stage">

  <div class="envelope" id="envelope">

    <div class="flap" id="flap">
      <div class="invite">BY INVITATION ONLY</div>
      <div class="logo">THE ARTIST TABLE</div>
    </div>

    <div class="seal" id="seal">
      <span>AT</span>
    </div>

    <div class="bottom-text">
      A curated art experience, designed for moments where standard settings are not enough
    </div>

  </div>

  <div class="touch">TOUCH TO UNSEAL</div>

</div>

<div class="letter-stage" id="letterStage">
  <div class="letter">
    <h1>One artist. One room.</h1>
  </div>
</div>

<div class="posted" id="posted">POSTED</div>

<script>

let opened = false;

document.getElementById("envelope").addEventListener("click", openEnvelope);

function openEnvelope(){

  if(opened) return;
  opened = true;

  const seal = document.getElementById("seal");
  const flap = document.getElementById("flap");
  const sound = document.getElementById("sound");

  // SOUND (veilig)
  sound.volume = 0.4;
  sound.play().catch(()=>{});

  // SEAL BREAK
  seal.classList.add("break");

  // FLAP OPEN
  setTimeout(()=>{
    flap.classList.add("open");
  },300);

  // SHOW LETTER
  setTimeout(()=>{
    document.querySelector(".stage").style.display="none";
    document.getElementById("letterStage").classList.add("show");
  },1400);

}

</script>

</body>
</html>
